<!DOCTYPE html><html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Bánh Kem</title>
<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
header{background:#ee4d2d;color:#fff;padding:14px;text-align:center;font-size:20px;font-weight:bold}
.search{padding:10px;background:#ee4d2d}
.search input{width:95%;padding:12px;border-radius:25px;border:none;font-size:14px}
.products{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:12px}
.card{background:#fff;border-radius:15px;overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,0.1);transition:0.2s}
.card:hover{transform:scale(1.03)}
.card img{width:100%;height:140px;object-fit:cover}
.card-content{padding:10px}
.title{font-size:15px;font-weight:bold}
.price{color:#ee4d2d;font-weight:bold;margin:5px 0}
.btn{background:#ee4d2d;color:#fff;border:none;padding:8px;border-radius:8px;margin-top:5px;width:100%;font-size:14px}
.btn:hover{opacity:0.9}
.nav{position:fixed;bottom:0;width:100%;background:#fff;display:flex;justify-content:space-around;border-top:1px solid #ccc;padding:10px}
.nav button{background:none;border:none;font-size:13px}
.section{display:none;padding-bottom:70px}
.active{display:block}
input,select{width:90%;padding:10px;margin:5px;border-radius:8px;border:1px solid #ccc}
</style>
</head>
<body>
<header>🍰 Shop Bánh Kem</header><div id="shop" class="section active">
<div class="search"><input placeholder="🔍 Tìm bánh kem..."></div>
<div class="products" id="productList"></div>
</div><div id="cart" class="section">
<h3>🛒 Giỏ hàng</h3>
<div id="cartItems"></div>
<p>Tổng: <b id="total"></b> đ</p>
<p>🚚 Phí ship: 20000 đ</p>
<button class="btn" onclick="showSection('checkout')">Thanh toán</button>
</div><div id="checkout" class="section">
<h3>💳 Thanh toán</h3>
<input id="address" placeholder="📍 Địa chỉ">
<input id="phone" placeholder="📞 SĐT">
<input id="voucher" placeholder="🎟️ Voucher">
<select id="payment">
<option>💵 Tiền mặt</option>
<option>💳 Thẻ</option>
</select>
<button class="btn" onclick="pay()">Xác nhận</button>
</div><div id="orders" class="section">
<h3>📦 Đơn hàng</h3>
<div id="orderList"></div>
</div><div id="account" class="section">
<h3>👤 Tài khoản</h3>
<button class="btn" onclick="logout()">Đăng xuất</button>
</div><div class="nav">
<button onclick="showSection('shop')">🏠<br>Shop</button>
<button onclick="showSection('cart')">🛒<br>Giỏ</button>
<button onclick="showSection('orders')">📦<br>Đơn</button>
<button onclick="showSection('account')">👤<br>Tôi</button>
</div><script>
let products=[
{name:"Bánh Dâu 🍓",price:100000,img:"https://images.unsplash.com/photo-1563720223185-11003d516935"},
{name:"Bánh Socola 🍫",price:120000,img:"https://images.unsplash.com/photo-1578985545062-69928b1d9587"},
{name:"Bánh Trái Cây 🍍",price:150000,img:"https://images.unsplash.com/photo-1605478371317-1c9b6a2f94d6"},
{name:"Bánh Matcha 🍵",price:130000,img:"https://images.unsplash.com/photo-1604908177522-4291d1c8c8dd"}
];

let cart=[];
let orders=[];

function showSection(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
renderCart();
renderOrders();
}

function renderProducts(){
let html="";
products.forEach((p,i)=>{
html+=`<div class='card'>
<img src='${p.img}'>
<div class='card-content'>
<div class='title'>${p.name}</div>
<div class='price'>${p.price}đ</div>
<button class='btn' onclick='addToCart(${i})'>➕ Thêm vào giỏ</button>
</div>
</div>`
});
document.getElementById("productList").innerHTML=html;
}

function addToCart(i){
let qty=prompt("Nhập số lượng:",1);
if(qty==null)return;
cart.push({...products[i],qty:parseInt(qty)});
alert("✅ Đã thêm vào giỏ!");
}

function renderCart(){
let html="";let total=0;
cart.forEach(c=>{
total+=c.price*c.qty;
html+=`<p>${c.name} x${c.qty} = ${c.price*c.qty}đ</p>`;
});
document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
}

function pay(){
let phone=document.getElementById("phone").value;
let voucher=document.getElementById("voucher").value;
if(!/^\d{9,}$/.test(phone)) return alert("❌ SĐT không hợp lệ");
if(voucher.length<6) return alert("❌ Voucher >=6 kí tự");

orders.push({total:cart.reduce((a,b)=>a+b.price*b.qty,0),status:"Đang giao 🚚"});
cart=[];
alert("🎉 Đặt hàng thành công!");
showSection('orders');
}

function renderOrders(){
let html="";
orders.forEach(o=>{
html+=`<p>🧾 ${o.total}đ - ${o.status}</p>`;
});
document.getElementById("orderList").innerHTML=html;
}

function logout(){
location.reload();
}

renderProducts();
</script></body>
</html>
