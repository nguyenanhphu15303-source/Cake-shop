<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng nhập</title>

<style>
body {
    font-family: Arial;
    background: #fff;
}

.container {
    width: 90%;
    max-width: 380px;
    margin: 40px auto;
}

h2 {
    text-align: center;
}

.input-group {
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 14px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    box-sizing: border-box;
    outline: none;
}

input:focus {
    border-color: #f57224;
}

.invalid {
    border-color: red !important;
}

.error {
    color: red;
    font-size: 12px;
    margin-top: 3px;
}

.password-box {
    position: relative;
}

.eye {
    position: absolute;
    right: 12px;
    top: 14px;
    cursor: pointer;
    font-size: 18px;
}

button {
    width: 100%;
    padding: 14px;
    background: #f57224;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
}

.link {
    text-align: center;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Đăng nhập</h2>

    <div class="input-group">
        <input id="account" placeholder="Số điện thoại hoặc Email">
        <div id="accountError" class="error"></div>
    </div>

    <div class="input-group password-box">
        <input type="password" id="password" placeholder="Mật khẩu">
        <span class="eye" onclick="togglePass('password', this)">🙈</span>
        <div id="passwordError" class="error"></div>
    </div>

    <button onclick="login()">Đăng nhập</button>

    <div class="link">
        <a href="register.html">Đăng ký</a>
    </div>
</div>

<script>

// 👁 HIỆN / ẨN MẬT KHẨU
function togglePass(id, el) {
    let input = document.getElementById(id);
    if (input.type === "password") {
        input.type = "text";
        el.innerText = "👁";
    } else {
        input.type = "password";
        el.innerText = "🙈";
    }
}

// VALIDATE EMAIL
function isEmail(val) {
    return val.endsWith("@gmail.com");
}

// VALIDATE PHONE
function isPhone(val) {
    return /^[0-9]{9,}$/.test(val);
}

// ĐĂNG NHẬP
function login() {
    let acc = document.getElementById("account");
    let password = document.getElementById("password");

    let valid = true;

    document.querySelectorAll(".error").forEach(e => e.innerText = "");
    document.querySelectorAll("input").forEach(e => e.classList.remove("invalid"));

    // kiểm tra tài khoản
    if (!isEmail(acc.value) && !isPhone(acc.value)) {
        document.getElementById("accountError").innerText = "Nhập đúng SĐT hoặc Gmail";
        acc.classList.add("invalid");
        valid = false;
    }

    // kiểm tra mật khẩu
    if (password.value.length < 8) {
        document.getElementById("passwordError").innerText = "Mật khẩu ≥ 8 ký tự";
        password.classList.add("invalid");
        valid = false;
    }

    if (!valid) return;

    let users = JSON.parse(localStorage.getItem("users")) || [];

    let user = users.find(u =>
        (u.email === acc.value || u.phone === acc.value) &&
        u.password === password.value
    );

    if (user) {
        alert("Đăng nhập thành công!");
        
         window.location.href = "shop.html";
    } else {
        document.getElementById("accountError").innerText = "Sai tài khoản hoặc mật khẩu";
        acc.classList.add("invalid");
    }
}
</script>

</body>
</html>
